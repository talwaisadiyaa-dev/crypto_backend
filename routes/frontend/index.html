<!DOCTYPE html>
<html>
<head>
    <title>Crypto Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0d1117;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #161b22;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            width: 200px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #21262d;
        }

        img {
            width: 40px;
        }

        .price {
            color: #00ffcc;
        }
    </style>
</head>

<body>

<h1>🚀 Crypto Dashboard</h1>

<div class="container" id="coinContainer"></div>

<script>
fetch('http://localhost:3000/api/coins')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('coinContainer');

    data.slice(0,10).forEach(coin => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <img src="${coin.image}" />
            <h3>${coin.name}</h3>
            <p class="price">$${coin.current_price}</p>
        `;

        container.appendChild(card);
    });
});
</script>

</body>
</html>
